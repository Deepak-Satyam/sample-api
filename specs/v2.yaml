openapi: 3.0.1
info:
  title: Sample Store API
  description: Sample API for SpecShield CLI testing
  version: 2.0.0

paths:

  /api/users:
    get:
      tags: [Users]
      summary: List all users
      operationId: listUsers
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

  # DELETE /api/users/{id} removed — BREAKING CHANGE

  /api/products:
    get:
      tags: [Products]
      summary: List all products
      operationId: listProducts
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      tags: [Products]
      summary: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid request

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

    delete:
      tags: [Products]
      summary: Delete a product
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '404':
          description: Product not found

  # NEW endpoint — ADDITION
  /api/orders:
    get:
      tags: [Orders]
      summary: List all orders
      operationId: listOrders
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by ID
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found

components:
  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        emailAddress:        # renamed from 'email' — BREAKING
          type: string
        phoneNumber:         # new field — ADDITION
          type: string
        # 'role' field removed — BREAKING

    CreateUserRequest:
      type: object
      required:
        - name
        - email
        # 'password' removed from required — MODIFICATION
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        phoneNumber:         # new optional field — ADDITION
          type: string

    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: string       # changed from number to string — BREAKING
        description:
          type: string
        stock:               # new field — ADDITION
          type: integer

    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - stock
      properties:
        name:
          type: string
        price:
          type: string
        description:
          type: string
        stock:
          type: integer

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        total:
          type: string
        status:
          type: string
          enum: [PENDING, SHIPPED, DELIVERED, CANCELLED]
